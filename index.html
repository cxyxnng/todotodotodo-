<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Y2K To-Do x Notion Final</title>
  <style>
    :root {
      --main-pink: #f9dae4;
      --heart-accent: #fc9ab7;
      --check-pink: #fecbde;
      --highlight-bg: #fff8fb;
      --text-gray: #666666;
      --item-border: #eeeeee;
    }

    body {
      background-color: #ffffff;
      font-family: 'Pretendard', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    /* 노션 설정창 디자인 */
    .notion-config {
      width: 330px;
      background: #fdfdfd;
      border: 2px solid var(--main-pink);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      box-sizing: border-box;
      box-shadow: 4px 4px 0px var(--main-pink);
    }
    .notion-config h4 { margin: 0 0 10px 0; color: var(--heart-accent); font-size: 14px; display: flex; align-items: center; gap: 5px; }
    .notion-config input {
      width: 100%;
      height: 32px;
      margin-bottom: 8px;
      border: 1px solid var(--item-border);
      border-radius: 4px;
      padding: 0 8px;
      font-size: 12px;
      box-sizing: border-box;
      outline: none;
    }
    .notion-config input:focus { border-color: var(--heart-accent); }
    .notion-config button {
      width: 100%;
      background: var(--main-pink);
      border: none;
      color: white;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }
    .notion-config button:hover { background: var(--heart-accent); }

    /* 투두 위젯 디자인 */
    .widget-card {
      width: 330px;
      background-color: var(--main-pink);
      padding: 5px;
      border-radius: 12px;
      box-shadow: inset 2px 2px 0px #ffffff, inset -2.5px -2.5px 0px #d9b8c4;
    }

    .inner-box {
      background: #ffffff;
      border-radius: 8px;
      border: 1.5px solid var(--main-pink);
      overflow: hidden;
    }

    .header {
      padding: 8px 12px;
      background-color: var(--highlight-bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--main-pink);
    }

    .title-group {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--main-pink);
      font-weight: bold;
      font-size: 14px;
    }

    .win-btn {
      background: var(--highlight-bg);
      border: 1px solid var(--main-pink);
      border-radius: 4px;
      width: 25px;
      height: 25px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--main-pink);
    }

    .input-row {
      padding: 15px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 1.5px dotted var(--main-pink);
    }

    #todoInput {
      flex: 1;
      height: 34px;
      padding: 0 10px;
      border: 1px solid var(--item-border);
      border-radius: 4px;
      outline: none;
      font-size: 13px;
    }

    .add-square-btn {
      width: 34px;
      height: 34px;
      background: var(--highlight-bg);
      border: 2.5px solid var(--main-pink);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .list-container {
      padding: 12px;
      max-height: 320px;
      overflow-y: auto;
    }

    .todo-card {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border: 1.2px solid var(--item-border);
      border-radius: 6px;
      margin-bottom: 8px;
      background: white;
    }

    .todo-card.checked .text { text-decoration: line-through; color: #ccc; }
    .checkbox-custom {
      width: 18px; height: 18px; border: 1.5px solid var(--check-pink);
      border-radius: 3px; margin-right: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .todo-card.checked .checkbox-custom { background-color: var(--check-pink); }
    .text { flex: 1; font-size: 14px; color: var(--text-gray); }
    .del-btn { background: none; border: none; cursor: pointer; color: #ddd; }
    svg { width: 16px; height: 16px; }
  </style>
</head>
<body>

  <div class="notion-config">
    <h4>🎀 Notion Connection</h4>
    <input type="password" id="notionToken" placeholder="ntn_으로 시작하는 토큰 입력">
    <input type="text" id="notionDbId" placeholder="데이터베이스 ID (32자리) 입력">
    <button onclick="fetchNotionData()">노션 목록 불러오기</button>
  </div>

  <div class="widget-card">
    <div class="inner-box">
      <div class="header">
        <div class="title-group">to do list</div>
        <div style="display: flex; gap: 4px;">
          <button class="win-btn" onclick="clearAll()">↺</button>
          <button class="win-btn" onclick="location.reload()">×</button>
        </div>
      </div>

      <div class="input-row">
        <input type="text" id="todoInput" placeholder="add a task...">
        <button class="add-square-btn" onclick="addTodo()">+</button>
      </div>

      <div class="list-container" id="todoList"></div>
    </div>
  </div>

  <script>
    const list = document.getElementById('todoList');
    const input = document.getElementById('todoInput');
    // 버튼 클릭 없이 통과하는 프록시 서버
    const PROXY = "https://api.allorigins.win/raw?url="; 

    window.onload = loadTodos;

    async function fetchNotionData() {
      const token = document.getElementById('notionToken').value.trim();
      const dbId = document.getElementById('notionDbId').value.trim();
      
      if(!token || !dbId) return alert("토큰과 ID를 모두 입력해주세요!");

      const notionUrl = `https://api.notion.com/v1/databases/${dbId}/query`;
      list.innerHTML = '<li>연결 중...</li>';

      try {
        const response = await fetch(PROXY + encodeURIComponent(notionUrl), {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Notion-Version': '2022-06-28',
            'Content-Type': 'application/json'
          }
        });

        const data = await response.json();
        
        if(data.object === "error") {
          alert("실패: " + data.message);
          list.innerHTML = '<li>연결 실패 ㅠㅠ</li>';
          return;
        }

        const items = data.results;
        list.innerHTML = '';

        items.forEach(item => {
          const properties = item.properties;
          let text = "내용 없음";
          
          // 칸 이름에 상관없이 'title'(제목) 유형을 찾아 텍스트 추출
          for (const key in properties) {
            if (properties[key].type === "title") {
              text = properties[key].title[0]?.plain_text || "내용 없음";
              break;
            }
          }
          createTodoElement(text, false);
        });
        
        saveTodos();
        alert("성공! " + items.length + "개의 목록을 가져왔습니다.");
      } catch (e) {
        alert("통신 에러가 발생했습니다.");
      }
    }

    function createTodoElement(text, isChecked) {
      const item = document.createElement('div');
      item.className = `todo-card ${isChecked ? 'checked' : ''}`;
      item.innerHTML = `
        <div class="checkbox-custom" onclick="toggleCheck(this)">
          <div style="display:${isChecked ? 'block' : 'none'}; color:white; font-size:12px;">✔</div>
        </div>
        <span class="text">${text}</span>
        <button class="del-btn" onclick="removeTodo(this)">×</button>
      `;
      list.appendChild(item);
    }

    function addTodo() {
      const val = input.value.trim();
      if (!val) return;
      createTodoElement(val, false);
      input.value = '';
      saveTodos();
    }

    function toggleCheck(el) {
      const card = el.closest('.todo-card');
      card.classList.toggle('checked');
      el.children[0].style.display = card.classList.contains('checked') ? 'block' : 'none';
      saveTodos();
    }

    function removeTodo(btn) {
      btn.closest('.todo-card').remove();
      saveTodos();
    }

    function saveTodos() {
      const todos = [];
      document.querySelectorAll('.todo-card').forEach(card => {
        todos.push({ text: card.querySelector('.text').innerText, checked: card.classList.contains('checked') });
      });
      localStorage.setItem('notion_y2k_todos', JSON.stringify(todos));
    }

    function loadTodos() {
      const saved = JSON.parse(localStorage.getItem('notion_y2k_todos') || '[]');
      saved.forEach(todo => createTodoElement(todo.text, todo.checked));
    }

    function clearAll() {
      if(confirm('전체 삭제할까요?')) { list.innerHTML = ''; localStorage.removeItem('notion_y2k_todos'); }
    }

    input.onkeypress = e => { if (e.key === 'Enter') addTodo(); };
  </script>
</body>
</html>
