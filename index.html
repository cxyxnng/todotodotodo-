<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Y2K Custom To-Do with Notion</title>
  <style>
    :root {
      --main-pink: #f9dae4;
      --heart-accent: #fc9ab7;
      --check-pink: #fecbde;
      --highlight-bg: #fff8fb;
      --text-gray: #666666;
      --item-border: #eeeeee;
    }

    body {
      background-color: #ffffff;
      font-family: 'Pretendard', sans-serif;
      display: flex;
      flex-direction: column; /* 세로 정렬 */
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    /* 노션 설정창 스타일 */
    .notion-config {
      width: 330px;
      background: #fdfdfd;
      border: 2px solid var(--main-pink);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }
    .notion-config h4 { margin: 0 0 10px 0; color: var(--heart-accent); font-size: 14px; }
    .notion-config input {
      width: 100%;
      height: 30px;
      margin-bottom: 8px;
      border: 1px solid var(--item-border);
      border-radius: 4px;
      padding: 0 8px;
      font-size: 12px;
      box-sizing: border-box;
    }
    .notion-config button {
      width: 100%;
      background: var(--main-pink);
      border: none;
      color: white;
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    .widget-card {
      width: 330px;
      background-color: var(--main-pink);
      padding: 5px;
      border-radius: 12px;
      box-shadow: inset 2px 2px 0px #ffffff, inset -2.5px -2.5px 0px #d9b8c4;
    }

    .inner-box {
      background: #ffffff;
      border-radius: 8px;
      border: 1.5px solid var(--main-pink);
      overflow: hidden;
    }

    .header {
      padding: 6px 12px;
      background-color: var(--highlight-bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--main-pink);
    }

    .title-group {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--main-pink);
      font-weight: bold;
      font-size: 14px;
    }

    .win-btn {
      background: var(--highlight-bg);
      border: 1px solid var(--main-pink);
      border-radius: 4px;
      width: 25px;
      height: 25px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--main-pink);
    }

    .input-row {
      padding: 15px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 1.5px dotted var(--main-pink);
    }

    input[type="text"] {
      flex: 1;
      height: 34px;
      padding: 0 10px;
      border: 1px solid var(--item-border);
      border-radius: 4px;
      outline: none;
      font-size: 13px;
      box-sizing: border-box;
    }

    .add-square-btn {
      width: 34px;
      height: 34px;
      background: var(--highlight-bg);
      border: 2.5px solid var(--main-pink);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    .add-square-btn svg { stroke: var(--main-pink); }

    .list-container {
      padding: 12px;
      max-height: 320px;
      overflow-y: auto;
    }

    .todo-card {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border: 1.2px solid var(--item-border);
      border-radius: 6px;
      margin-bottom: 8px;
      background: white;
      transition: all 0.2s;
    }

    .todo-card.highlight {
      background-color: var(--highlight-bg);
      border-color: var(--heart-accent);
    }

    .todo-card.highlight .text { color: var(--heart-accent); font-weight: 500; }
    .todo-card.checked .text { text-decoration: line-through; color: #ccc; }

    .checkbox-custom {
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--check-pink);
      border-radius: 3px;
      margin-right: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .todo-card.checked .checkbox-custom { background-color: var(--check-pink); }

    .text { flex: 1; font-size: 14px; color: var(--text-gray); }

    .btns { display: flex; gap: 6px; align-items: center; }

    .icon-only, .del-icon-btn {
      background: none; border: none; cursor: pointer; padding: 2px;
      color: #ddd; display: flex; align-items: center; justify-content: center;
    }

    .heart-btn.active { color: var(--heart-accent); }
    .heart-btn.active svg { fill: var(--heart-accent); }

    svg { width: 16px; height: 16px; }
  </style>
</head>
<body>

  <!-- 노션 설정창 (상단에 추가됨) -->
  <div class="notion-config">
    <h4>🎀 Notion Connection</h4>
    <input type="password" id="notionToken" placeholder="노션 API 토큰 입력">
    <input type="text" id="notionDbId" placeholder="데이터베이스 ID 입력">
    <button onclick="fetchNotionData()">목록 불러오기</button>
  </div>

  <div class="widget-card">
    <div class="inner-box">
      <div class="header">
        <div class="title-group">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"></path>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
          </svg>
          to do list
        </div>
        <div style="display: flex; gap: 4px;">
          <button class="win-btn" onclick="clearAll()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
            </svg>
          </button>
          <button class="win-btn" onclick="location.reload()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>

      <div class="input-row">
        <input type="text" id="todoInput" placeholder="add a task...">
        <button class="add-square-btn" onclick="addTodo()">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="4">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>

      <div class="list-container" id="todoList"></div>
    </div>
  </div>

  <script>
    const list = document.getElementById('todoList');
    const input = document.getElementById('todoInput');
    const PROXY = "https://api.allorigins.win/raw?url="; // 버튼 안눌러도 되는 통로

    window.onload = loadTodos;

    // --- 노션 데이터 가져오기 기능 ---
    async function fetchNotionData() {
      const token = document.getElementById('notionToken').value;
      const dbId = document.getElementById('notionDbId').value;
      
      if(!token || !dbId) return alert("토큰과 ID를 입력해주세요!");

      const notionUrl = `https://api.notion.com/v1/databases/${dbId}/query`;
      
      try {
        const response = await fetch(PROXY + encodeURIComponent(notionUrl), {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Notion-Version': '2022-06-28',
            'Content-Type': 'application/json'
          }
        });

        const data = await response.json();
        const items = data.results;

        // 기존 리스트 비우고 노션 데이터 추가
        list.innerHTML = '';
        items.forEach(item => {
          // '할일', 'Name', '제목' 중 하나를 찾아서 가져옴
          const prop = item.properties['할일'] || item.properties['Name'] || item.properties['제목'];
          const text = prop.title[0]?.plain_text || "내용 없음";
          createTodoElement(text, false, false);
        });
        
        saveTodos();
        alert("노션에서 목록을 가져왔습니다! ✨");
      } catch (e) {
        alert("연결 실패! 노션 페이지에서 '연결 추가'를 했는지 확인하세요.");
      }
    }

    // --- 기존 투두리스트 기능 ---
    function saveTodos() {
      const todos = [];
      document.querySelectorAll('.todo-card').forEach(card => {
        todos.push({
          text: card.querySelector('.text').innerText,
          checked: card.classList.contains('checked'),
          highlight: card.classList.contains('highlight')
        });
      });
      localStorage.setItem('y2k_todos', JSON.stringify(todos));
    }

    function loadTodos() {
      const saved = JSON.parse(localStorage.getItem('y2k_todos') || '[]');
      saved.forEach(todo => {
        createTodoElement(todo.text, todo.checked, todo.highlight);
      });
    }

    function createTodoElement(text, isChecked, isHighlight) {
      const item = document.createElement('div');
      item.className = `todo-card ${isChecked ? 'checked' : ''} ${isHighlight ? 'highlight' : ''}`;
      item.innerHTML = `
        <div class="checkbox-custom" onclick="toggleCheck(this)">
          <svg class="mark" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" style="display:${isChecked ? 'block' : 'none'};">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <span class="text">${text}</span>
        <div class="btns">
          <button class="icon-only heart-btn ${isHighlight ? 'active' : ''}" onclick="toggleHighlight(this)">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
          </button>
          <button class="del-icon-btn" onclick="removeTodo(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      `;
      list.appendChild(item);
    }

    function addTodo() {
      const val = input.value.trim();
      if (!val) return;
      createTodoElement(val, false, false);
      input.value = '';
      saveTodos();
    }

    function toggleCheck(el) {
      const card = el.closest('.todo-card');
      card.classList.toggle('checked');
      el.querySelector('.mark').style.display = card.classList.contains('checked') ? 'block' : 'none';
      saveTodos();
    }

    function toggleHighlight(btn) {
      const card = btn.closest('.todo-card');
      btn.classList.toggle('active');
      card.classList.toggle('highlight');
      if (card.classList.contains('highlight')) list.prepend(card);
      saveTodos();
    }

    function removeTodo(btn) {
      btn.closest('.todo-card').remove();
      saveTodos();
    }

    function clearAll() {
      if(confirm('모든 목록을 삭제할까요?')) {
        list.innerHTML = '';
        localStorage.removeItem('y2k_todos');
      }
    }

    input.onkeypress = e => { if (e.key === 'Enter') addTodo(); };
  </script>
</body>
</html>
